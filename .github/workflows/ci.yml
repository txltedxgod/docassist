name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: docassist
          POSTGRES_PASSWORD: docassist
          POSTGRES_DB: docassist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U docassist"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://docassist:docassist@localhost:5432/docassist_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: |
          ruff check app bot tests
          ruff format --check app bot tests

      - name: Type-check (mypy)
        run: mypy app bot

      - name: Tests (pytest)
        run: pytest
